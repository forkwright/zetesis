[graph]
targets = []
all-features = false

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"

[licenses]
unlicensed = "deny"
allow = [
    "MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause",
    "ISC", "Unicode-3.0", "Zlib", "MPL-2.0", "AGPL-3.0-or-later",
    "CDLA-Permissive-2.0", "LicenseRef-PolyForm-Shield-1.0.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

# WHY: transitive dependency version splits from different upstream crates.
skip = [
    { crate = "getrandom" },
    { crate = "hashbrown" },
    { crate = "windows-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
