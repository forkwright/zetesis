name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Validate workspace scaffold
        run: cargo metadata --no-deps --format-version 1
      - name: Check Rust formatting
        run: |
          if cargo metadata --no-deps --format-version 1 | jq -e '.packages | length > 0' >/dev/null; then
            cargo fmt --all -- --check
          else
            echo "No workspace packages yet; cargo fmt has no targets."
          fi
      - name: Run Rust tests
        run: |
          if cargo metadata --no-deps --format-version 1 | jq -e '.packages | length > 0' >/dev/null; then
            cargo test --workspace
          else
            echo "No workspace packages yet; cargo test has no targets."
          fi
      - name: Run dependency audit
        run: |
          if cargo metadata --no-deps --format-version 1 | jq -e '.packages | length > 0' >/dev/null; then
            cargo install cargo-deny --locked
            cargo deny check
          else
            echo "No workspace packages yet; cargo deny has no graph."
          fi
      - name: Reject blanket clippy allows
        run: |
          if grep -n ' = "allow"' Cargo.toml; then
            echo "::error::Blanket clippy allows are not permitted"
            exit 1
          fi
